# Browser data patterns.
# Glob patterns matching browser credential databases and cookies.
- "~/Library/Application Support/Google/Chrome/*/Login Data*"
- "~/Library/Application Support/Firefox/Profiles/**/*.sqlite"
- "~/.mozilla/firefox/**/*.sqlite"
- "~/.config/google-chrome/*/Login Data*"
- "~/Library/Application Support/Google/Chrome/*/Cookies*"
- "~/.config/google-chrome/*/Cookies*"
- "~/Library/Application Support/discord/Local Storage/**"
- "~/.config/discord/Local Storage/**"
- "~/Library/Application Support/Exodus/exodus.wallet/**"
- "~/.config/Exodus/exodus.wallet/**"
- "~/Library/Application Support/Electrum/wallets/**"
- "~/.electrum/wallets/**"
- "~/.config/solana/id.json"
- "~/.bitcoin/wallet.dat"
- "~/.ethereum/keystore/**"
