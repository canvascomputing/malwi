# Credential file patterns.
# Glob patterns matching SSH keys, cloud credentials, and secret key files.
- ~/.ssh/**
- "*/.ssh/**"
- ~/.aws/**
- "*/.aws/**"
- ~/.config/gcloud/**
- ~/.azure/**
- ~/.gnupg/**
- ~/.config/gh/**
- "*/.kube/config"
- "*.pem"
- "*.key"
- "*id_rsa*"
- "*id_ed25519*"
- ~/.git-credentials
- ~/.netrc
- ~/.pypirc
- ~/.npmrc
- ~/.docker/config.json
- "*/.env"
- "**/.env"
- /var/run/secrets/kubernetes.io/**
