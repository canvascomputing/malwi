version: 1

# Auto-policy for ComfyUI (AI image generation)
# Customise: ~/.config/malwi/policies/comfyui.yaml
#
# Threat model: malicious custom node running arbitrary Python.
# exec/compile/eval cannot be denied — Python's import system uses them.
#
# Enforcement:
#   python: deny    — ENFORCED (agent raises PermissionError)
#   commands: deny  — ENFORCED (agent blocks spawn)
#   network: allow  — ENFORCED (auto-traces HTTP functions, blocks non-allowed hosts)
#   symbols: warn   — display only
#   files/envvars   — display only

python:
  deny:
    # Credential theft — no command-level equivalent
    - getpass.getpass
    - keyring.get_password
    - keyring.set_password
    # Native code loading — bypasses all Python-level controls
    - ctypes.CDLL
    - ctypes.cdll.LoadLibrary
    - ctypes.WinDLL

commands:
  allow:
    - "git clone *"
    - "git pull *"
    - "git fetch *"
    - "git checkout *"
    - "git submodule *"
    - "git status"
    - "git status *"
    - "git version"
    - "git rev-parse *"
    - "git log *"
    - "git diff *"
    - "git describe *"
    - "git branch"
    - "git branch *"
    - "git show *"
    - "git config *"
    - "git ls-remote *"
    - "git remote -v"
    - "pip install *"
    - "pip3 install *"
    - "pip freeze"
    - "pip list"
    - "pip show *"
    - "python -m pip *"
    - "python3 -m pip *"
    - "uv pip *"
    - "uv sync *"
    - "uv run *"
    - "python3 -I *"
    - "python -I *"
    - "python3 -c *"
    - "python -c *"
    - "python3 --version"
    - "python --version"
    - "nvidia-smi"
    - "nvidia-smi *"
  # No deny needed — everything not in allow list is blocked by default.

symbols:
  warn:
    - getpass
    - crypt
    - keyring

# Network allowlist — default-deny. Everything not listed below is blocked.
# The system auto-hooks requests.get, httpx.post, etc. from taxonomy and
# evaluates the URL argument against these rules.
network:
  allow:
    - "huggingface.co/**"
    - "*.huggingface.co/**"
    - "civitai.com/**"
    - "*.civitai.com/**"
    - "github.com/**"
    - "*.githubusercontent.com/**"
    - "codeload.github.com/**"
    - "pypi.org/**"
    - "*.pypi.org/**"
    - "files.pythonhosted.org/**"
    - "*.pythonhosted.org/**"
    - "127.0.0.1:*/**"
    - "localhost:*/**"
    - "0.0.0.0:*/**"
  # No deny/warn needed — implicit deny blocks everything not in allow list.
  protocols: [https, http, wss, ws]

files:
  deny:
    - "~/.ssh/**"
    - "*/.ssh/**"
    - "~/.aws/**"
    - "*/.aws/**"
    - "~/.config/gcloud/**"
    - "~/.azure/**"
    - "~/.gnupg/**"
    - "~/.config/gh/**"
    - "*/.kube/config"
    - "*.pem"
    - "*.key"
    - "*id_rsa*"
    - "*id_ed25519*"
    - "~/.local/share/keyrings/**"
    - "~/.local/share/kwalletd/**"
    - "~/.config/autostart/**"
    - "~/.config/systemd/user/**"
    - "/etc/ld.so.preload"
    - "~/Library/LaunchAgents/**"

envvars:
  deny:
    - "*SECRET*"
    - "*TOKEN*"
    - "*PASSWORD*"
    - "*API_KEY*"
    - "*PRIVATE_KEY*"
    - "AWS_*"
    - "GITHUB_*"
    - "GCP_*"
    - "AZURE_*"
    - "OPENAI_*"
    - "ANTHROPIC_*"
    - HF_TOKEN
    - DYLD_INSERT_LIBRARIES
    - LD_PRELOAD
