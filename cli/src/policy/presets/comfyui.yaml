version: 1

# ComfyUI — auto-policy for AI image generation
# Customise: ~/.config/malwi/policies/comfyui.yaml
#
# Threat model: malicious custom node running arbitrary Python.
# Note: exec/compile/eval cannot be denied — Python's import system uses them.
#
# Sections:
#   python   — block credential theft + native code loading
#   commands — allowlist only (unlisted commands blocked)
#   network  — allowlist only (unlisted hosts blocked)
#   files    — block sensitive credential/config paths
#   envvars  — block secret envvars (HF config flags exempted)
#   symbols  — warn on dangerous native symbols

python:
  deny:
    # Credential theft — no command-level equivalent
    - getpass.getpass
    - keyring.get_password
    - keyring.set_password
    # Native code loading — bypasses all Python-level controls
    - ctypes.CDLL
    - ctypes.cdll.LoadLibrary
    - ctypes.WinDLL

commands:
  allow:
    - "git clone *"
    - "git pull *"
    - "git fetch *"
    - "git checkout *"
    - "git submodule *"
    - "git status"
    - "git status *"
    - "git version"
    - "git rev-parse *"
    - "git log *"
    - "git diff *"
    - "git describe *"
    - "git branch"
    - "git branch *"
    - "git show *"
    - "git config *"
    - "git ls-remote *"
    - "git remote -v"
    - "pip install *"
    - "pip3 install *"
    - "pip freeze"
    - "pip list"
    - "pip show *"
    - "python -m pip *"
    - "python3 -m pip *"
    - "uv pip *"
    - "uv sync *"
    - "uv run *"
    - "python3 -I *"
    - "python -I *"
    - "python3 -c *"
    - "python -c *"
    - "python3 --version"
    - "python --version"
    - "nvidia-smi"
    - "nvidia-smi *"
  # Unlisted commands are blocked.

symbols:
  warn:
    - getpass
    - crypt
    - keyring
    - symlink
    - link
    - syscall

# Unlisted hosts are blocked. HTTP functions auto-hooked from taxonomy.
network:
  allow:
    - "huggingface.co/**"
    - "*.huggingface.co/**"
    - "civitai.com/**"
    - "*.civitai.com/**"
    - "github.com/**"
    - "*.githubusercontent.com/**"
    - "codeload.github.com/**"
    - "pypi.org/**"
    - "*.pypi.org/**"
    - "files.pythonhosted.org/**"
    - "*.pythonhosted.org/**"
    - "127.0.0.1:*/**"
    - "localhost:*/**"
    - "0.0.0.0:*/**"
  # Unlisted hosts blocked.
  protocols: [https, http, wss, ws]

files:
  deny:
    - "~/.ssh/**"
    - "*/.ssh/**"
    - "~/.aws/**"
    - "*/.aws/**"
    - "~/.config/gcloud/**"
    - "~/.azure/**"
    - "~/.gnupg/**"
    - "~/.config/gh/**"
    - "*/.kube/config"
    - "*.pem"
    - "*.key"
    - "*id_rsa*"
    - "*id_ed25519*"
    - "~/.local/share/keyrings/**"
    - "~/.local/share/kwalletd/**"
    - "~/.config/autostart/**"
    - "~/.config/systemd/user/**"
    - "/etc/ld.so.preload"
    - "~/Library/LaunchAgents/**"
    # macOS credential/browser stores
    - "~/Library/Keychains/**"
    - "~/Library/Cookies/**"
    - "~/Library/Application Support/Google/Chrome/*/Login Data*"
    - "~/Library/Application Support/Firefox/Profiles/**/*.sqlite"
    # Linux browser stores
    - "~/.mozilla/firefox/**/*.sqlite"
    - "~/.config/google-chrome/*/Login Data*"
    # macOS persistence
    - "/Library/LaunchDaemons/**"
    - "/Library/LaunchAgents/**"
    # Linux persistence
    - "/etc/cron.d/**"
    - "/etc/cron.daily/**"
    - "/etc/crontab"
    - "~/.crontab"
    # Shell configs (persistence vector)
    - "~/.bashrc"
    - "~/.zshrc"
    - "~/.profile"
    - "~/.bash_profile"

envvars:
  allow:
    # HF config flags — not secrets, needed by transformers/huggingface_hub
    - HF_HUB_*
    - HF_TOKEN_PATH
  deny:
    - "*SECRET*"
    - "*TOKEN*"
    - "*PASSWORD*"
    - "*API_KEY*"
    - "*PRIVATE_KEY*"
    - "AWS_*"
    - "GITHUB_*"
    - "GCP_*"
    - "AZURE_*"
    - "OPENAI_*"
    - "ANTHROPIC_*"
    - HF_TOKEN
    - DYLD_INSERT_LIBRARIES
    - LD_PRELOAD
