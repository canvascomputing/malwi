- curl
- wget
- aria2c
- fetch
# SSH/SCP
- ssh
- scp
- sftp
- ssh-copy-id
- ssh-keyscan
# FTP
- ftp
- lftp
# Raw sockets
- nc
- ncat
- netcat
- socat
- telnet
# Sync/transfer
- rsync
- rclone
- smbutil
- smbclient
# TLS/crypto
- openssl
- stunnel
